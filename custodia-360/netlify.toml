[build]
  # Build command optimized for Netlify
  command = "npm ci --legacy-peer-deps && npm run build:production"
  # For Next.js dynamic apps, don't specify publish directory
  # publish = ".next"  # Removed - let Netlify auto-detect

# Essential Next.js plugin for Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # Node.js 18 LTS is recommended for Netlify
  NODE_VERSION = "18"
  NODE_OPTIONS = "--max-old-space-size=8192"

  # Build optimizations for Netlify
  SKIP_TYPE_CHECK = "true"
  DISABLE_ESLINT = "true"
  NPM_FLAGS = "--legacy-peer-deps"

  # Supabase Configuration
